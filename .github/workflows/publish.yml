name: Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Read package metadata
        id: package
        run: |
          echo "name=$(node -p 'require(\"./package.json\").name')" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Check npm publish status
        id: npm_status
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check GitHub release status
        id: release_status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.package.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install ts-proto plugin
        run: npm install -g ts-proto

      - name: Create gen directory
        run: mkdir -p gen

      - name: Generate TS Protobuf
        run: yarn run generate

      - run: npm publish
        name: Publish to npm
        id: publish
        if: steps.npm_status.outputs.published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: steps.release_status.outputs.exists != 'true' && (steps.npm_status.outputs.published == 'true' || steps.publish.outcome == 'success')
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          gh release create "v${PACKAGE_VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "v${PACKAGE_VERSION}" \
            --generate-notes \
            --notes "Published \`${PACKAGE_NAME}@${PACKAGE_VERSION}\` to npm. Package: https://www.npmjs.com/package/${PACKAGE_NAME}"
